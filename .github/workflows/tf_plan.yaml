name: Terraform plan - Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/env/test/**"

env:
  TF_INPUT: false

permissions:
  id-token: write        # necesario para OIDC/WIF con GCP
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform/env/test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # === Autenticación contra GCP usando Workload Identity Federation ===
      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Definido como repo/env var en GitHub: projects/.../workloadIdentityPools/.../providers/...
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}

          # Service Account que Terraform va a impersonar
          service_account: ${{ vars.GCP_TF_SERVICE_ACCOUNT }}

          # Para que Terraform use ADC sin key JSON larga
          create_credentials_file: true
          export_environment_variables: true

      - name: Terraform - Setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.5

      - name: Terraform - Format and style
        id: fmt
        run: terraform fmt -check -diff -recursive
        continue-on-error: true

      - name: Terraform - Init
        id: init
        run: terraform init

      - name: Terraform - Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform - Plan
        id: plan
        run: |
          terraform plan \
            -var "host_project_id=${{ vars.HOST_PROJECT_ID }}" \
            -var "service_project_id=${{ vars.SERVICE_PROJECT_ID }}" \
            -var "region=${{ vars.REGION }}" \
            -out=plan.tmp
          terraform show -no-color plan.tmp >${GITHUB_WORKSPACE}/plan.out

      - name: Terraform - Show Plan in PR
        uses: actions/github-script@v8
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run_url = process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID
            const run_link = '<a href="' + run_url + '">Actions</a>.'
            const fs = require('fs')
            const plan_file = fs.readFileSync('plan.out', 'utf8')
            const plan = plan_file.length > 65000 ? plan_file.toString().substring(0, 65000) + " ..." : plan_file
            const truncated_message = plan_file.length > 65000 ? "Output is too long and was truncated. You can read full Plan in " + run_link + "<br /><br />" : ""
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`

            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${plan}
            \`\`\`

            </details>
            ${truncated_message}

            *Pusher: @${{ github.actor }}, Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })